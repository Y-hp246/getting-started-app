name: Docker Build Check

# This tells GitHub WHEN to run the pipeline (Step 3 in the reading)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# This tells GitHub WHAT to do
jobs:
  test-docker-build:
    runs-on: ubuntu-latest

    steps:
      # 1. Grab the code from the GitHub repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Try to build the Docker image using the Alpine Dockerfile
      - name: Test Docker Build
        run: docker build . -t my-todo-app:test