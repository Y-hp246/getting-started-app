name: Docker CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Static analysis of your Dockerfile
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

  # Job 2: The actual build process
  build:
    needs: lint  # This connects the 'lint' block to this 'build' block
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build . -t my-todo-app:test

  # Job 3: Scanning the image for vulnerabilities
  security-scan:
    needs: build # This block only appears/runs after the build is successful
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Using Trivy to scan the image we just thought about building
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-todo-app:test'
          format: 'table'
          exit-code: '0' # This allows the pipeline to pass even if vulnerabilities exist
          severity: 'CRITICAL,HIGH'